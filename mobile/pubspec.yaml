name: msdev_mobile
description: MSDEV - Collaborative Project Management Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  firebase_messaging: ^16.2.2
  google_sign_in: ^6.2.1
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  # State
  flutter_riverpod: ^3.3.1
  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.2
  share_plus: ^13.1.0
  image_picker: ^1.0.4
  go_router: ^17.2.3
  curved_navigation_bar: ^1.0.6
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/MSDEV.png"
  min_sdk_android: 21
