<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSDEV Global Dashboard</title>
<style>
:root {
  --bg: #0d1117; --bg-elevated: #161b22; --bg-card: #1a2133;
  --text-1: #e6edf3; --text-2: #8b949e; --text-3: #6e7681;
  --border: #30363d;
  --accent: #2dd4bf; --accent2: #3b82f6;
  --cyan: #06b6d4; --purple: #8b5cf6; --emerald: #10b981; --amber: #f59e0b;
  --danger: #ef4444; --warning: #f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:auto;background:var(--bg);color:var(--text-1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;}
body{padding:24px;max-width:1400px;margin:0 auto;}

/* TOP BANNER */
.banner {
  padding:20px 28px; display:flex; align-items:center; justify-content:space-between;
  background:rgba(30, 41, 59, 0.4); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.05);
  border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,0.2); margin-bottom:24px;
}
.banner-left { display:flex; align-items:center; gap:16px; }
.avatar {
  width:46px; height:46px; border-radius:50%; background:linear-gradient(135deg, var(--accent) 0%, #8b5cf6 100%);
  display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; font-weight:700;
  overflow:hidden; border:2px solid rgba(255,255,255,0.1);
}
.greeting { font-size:22px; font-weight:700; letter-spacing:-0.01em; color:var(--text-1); margin-bottom:4px; }
.subtitle { color:var(--text-3); font-size:13px; }
.btn-primary {
  background:var(--accent); color:#0d1117; padding:8px 16px; border-radius:10px; font-weight:600;
  font-size:13px; border:none; cursor:pointer; display:flex; align-items:center; gap:6px;
}
.btn-primary:hover { background:#14b8a6; }

/* GRID 1: STATS & MAP */
.grid-row-1 { display:grid; grid-template-columns:minmax(0, 1fr) 340px; gap:24px; margin-bottom:24px; align-items:start; }
.stats-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:16px; }
.stat-card {
  background:var(--bg-elevated); border:1px solid rgba(255,255,255,0.05); border-radius:14px;
  padding:20px; position:relative; overflow:hidden;
}
.stat-card:hover { transform:translateY(-4px); background:rgba(255,255,255,0.03); transition:all 0.2s; }
.stat-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
.stat-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
.stat-trend { font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px; }
.stat-value { font-size:28px; font-weight:800; color:var(--text-1); line-height:1; }
.stat-label { font-size:12px; color:var(--text-3); margin-top:8px; font-weight:600; }

.card { background:var(--bg-elevated); border:1px solid rgba(255,255,255,0.05); border-radius:16px; padding:24px; display:flex; flex-direction:column; }
.card-title { font-size:14px; font-weight:700; color:var(--text-1); display:flex; align-items:center; gap:8px; margin-bottom:16px;}
.activity-map-box { position:relative; height:74px; overflow:hidden; border-radius:8px; display:flex; align-items:flex-start; justify-content:flex-end; background:var(--bg-card); }
.map-month { position:absolute; top:6px; left:10px; font-size:10px; font-weight:700; color:var(--text-3); z-index:10; text-transform:uppercase; letter-spacing:0.05em; }

/* GRID 2: PROJECTS & DEADLINES */
.grid-row-2 { display:grid; grid-template-columns:minmax(0, 1fr) 340px; gap:24px; margin-bottom:24px; align-items:start; }
.projects-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
.project-card {
  border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:20px; cursor:pointer;
  background:rgba(255,255,255,0.01); position:relative; overflow:hidden; height:150px;
}
.project-card:hover { border-color:rgba(255,255,255,0.1); transform:translateY(-4px); transition:all 0.2s; }
.proj-title { font-size:15px; font-weight:700; color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.proj-priority { font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; }
.proj-desc { font-size:12px; color:var(--text-3); margin:12px 0 20px; line-height:1.5; height:36px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.proj-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.progress-bg { height:4px; background:rgba(255,255,255,0.05); border-radius:99px; overflow:hidden; }
.progress-fill { height:100%; border-radius:99px; transition:width 1s ease-out; }

.task-list { display:flex; flex-direction:column; gap:12px; overflow-y:auto; flex:1; padding-right:4px; }
.task-list::-webkit-scrollbar{width:4px;}
.task-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.deadline-item { display:flex; gap:12px; padding:12px; background:rgba(255,255,255,0.02); border-radius:8px; border:1px solid rgba(255,255,255,0.03); cursor:pointer; }
.deadline-item:hover { background:rgba(255,255,255,0.05); }

/* GRID 3: ANALYTICS & RECENT */
.grid-row-3 { display:grid; grid-template-columns:minmax(0, 1fr) 340px; gap:24px; align-items:stretch; }
.chart-container { display:flex; align-items:flex-end; gap:12px; height:140px; padding:0 10px; }
.chart-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; }
.chart-bar { width:100%; background:rgba(255,255,255,0.1); border-radius:4px 4px 0 0; }
.recent-item { display:flex; gap:12px; margin-bottom:16px; }
.recent-icon { width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,0.05); display:flex; align-items:center; justify-content:center; font-size:12px; z-index:1; position:relative; }
.line { position:absolute; top:28px; left:13px; width:2px; height:24px; background:rgba(255,255,255,0.05); }
.empty { text-align:center; color:var(--text-3); font-size:13px; padding:20px; }

/* MODAL SYSTEM */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.hidden{display:none;}
.modal-box{background:#111827;border:1px solid var(--border);border-radius:14px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.6);animation:slideUp .2s ease-out;}
.modal-box.modal-sm{max-width:420px;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;padding:20px 24px 0;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:700;}
.modal-body{padding:0 24px 24px;}
.close-btn{background:transparent;border:none;color:var(--text-2);font-size:18px;cursor:pointer;padding:4px;line-height:1;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;}
.close-btn:hover{background:var(--bg-elevated);color:var(--text-1);}

/* FORM FIELDS */
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
.form-label{font-size:11px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;}
.form-input{background:var(--bg-elevated);color:var(--text-1);border:1px solid var(--border);padding:10px 12px;border-radius:7px;font-size:13px;font-family:inherit;width:100%;transition:border-color .15s;}
.form-input:focus{outline:none;border-color:var(--accent);}
textarea.form-input{resize:vertical;min-height:80px;}

@media(max-width: 900px) {
  .grid-row-1, .grid-row-2, .grid-row-3 { grid-template-columns:1fr; }
  .stats-grid { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

<div id="root">
  <div class="empty">Loading Dashboard...</div>
</div>

<!-- CREATE PROJECT MODAL -->
<div class="modal-overlay hidden" id="create-project-modal" onclick="if(event.target===this)closeCreateProject()">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <div style="display:flex; align-items:center; gap:12px;">
        <div style="width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg, #06b6d4, #3b82f6); display:flex; align-items:center; justify-content:center; color:#fff; font-size:18px; font-weight:700;">+</div>
        <div>
          <div class="modal-title">Create New Project</div>
          <div style="font-size:12px; color:var(--text-3); font-weight:500;">Set up your workspace in seconds</div>
        </div>
      </div>
      <button class="close-btn" onclick="closeCreateProject()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group full" style="margin-bottom:16px">
        <label class="form-label" style="color:var(--accent)">PROJECT NAME *</label>
        <input id="cp-name" class="form-input" style="border-color:var(--accent)" placeholder="e.g. E-Commerce Platform" autofocus />
      </div>
      <div class="form-group full" style="margin-bottom:16px">
        <label class="form-label">DESCRIPTION</label>
        <textarea id="cp-desc" class="form-input" rows="3" placeholder="What is this project about?"></textarea>
      </div>
      <div class="form-group full" style="margin-bottom:24px">
        <label class="form-label">LIVE URL <span style="text-transform:lowercase; color:var(--text-3); font-weight:400">(optional)</span></label>
        <div style="position:relative">
          <span style="position:absolute; left:12px; top:11px; color:var(--text-3)">🔗</span>
          <input id="cp-url" class="form-input" style="padding-left:36px;" placeholder="https://..." />
        </div>
      </div>
      <div style="display:flex; gap:12px; justify-content:space-between">
        <button style="flex:1; padding:10px; font-size:13px; background:var(--bg-elevated); color:var(--text-1); border:1px solid var(--border); border-radius:8px; cursor:pointer;" onclick="closeCreateProject()">Cancel</button>
        <button class="btn-primary" id="btn-submit-project" style="flex:1; padding:10px; font-size:13px; justify-content:center;" onclick="submitCreateProject()">+ Create Project</button>
      </div>
    </div>
  </div>
</div>

<script nonce="{{NONCE}}">
const vscode = acquireVsCodeApi();

let state = { projects: [], tasks: [], user: null };

window.addEventListener('message', e => {
  const m = e.data;
  if (m.command === 'updateAll') {
    state = { projects: m.projects||[], tasks: m.tasks||[], user: m.user };
    render();
  }
  if (m.command === 'projectCreated') {
    closeCreateProject();
    const btn = document.getElementById('btn-submit-project');
    if(btn) { btn.disabled = false; btn.textContent = '+ Create Project'; }
    document.getElementById('cp-name').value = '';
    document.getElementById('cp-desc').value = '';
    document.getElementById('cp-url').value = '';
  }
  if (m.command === 'projectCreateError') {
    const btn = document.getElementById('btn-submit-project');
    if(btn) { btn.disabled = false; btn.textContent = '+ Create Project'; }
  }
});

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(dateInput) {
  if (!dateInput) return 'Just now';
  const d = new Date(dateInput);
  const seconds = Math.floor((new Date() - d) / 1000);
  if (seconds < 60) return 'Just now';
  const mins = Math.floor(seconds / 60);
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

function render() {
  const { projects, tasks, user } = state;
  const root = document.getElementById('root');

  const activeProjects = projects.filter(p => !p.archived).length;
  const completedTasks = tasks.filter(t => ['completed', 'deployed'].includes(t.status));
  const pendingTasks = tasks.filter(t => t.status === 'pending' || t.status === 'in_progress');
  const githubSync = tasks.filter(t => t.status === 'github_pushed').length;

  const hr = new Date().getHours();
  const greeting = hr < 12 ? 'morning' : hr < 18 ? 'afternoon' : 'evening';
  const name = user?.displayName?.split(' ')[0] || 'Developer';
  
  const initials = user?.displayName ? user.displayName.charAt(0).toUpperCase() : 'U';
  const avatarHtml = user?.photoURL 
    ? `<img src="${esc(user.photoURL)}" style="width:100%;height:100%;object-fit:cover" />`
    : initials;

  // Stats Grid
  const statsHtml = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-header">
          <div class="stat-icon" style="background:#06b6d415; color:#06b6d4">📂</div>
          <span class="stat-trend" style="background:#06b6d415; color:#06b6d4">+12%</span>
        </div>
        <div class="stat-value">${activeProjects}</div>
        <div class="stat-label">Active Projects</div>
      </div>
      <div class="stat-card">
        <div class="stat-header">
          <div class="stat-icon" style="background:#8b5cf615; color:#8b5cf6">📋</div>
          <span class="stat-trend" style="background:#8b5cf615; color:#8b5cf6">+5%</span>
        </div>
        <div class="stat-value">${tasks.length}</div>
        <div class="stat-label">Total Tasks</div>
      </div>
      <div class="stat-card">
        <div class="stat-header">
          <div class="stat-icon" style="background:#10b98115; color:#10b981">🐙</div>
          <span class="stat-trend" style="background:#10b98115; color:#10b981">+2%</span>
        </div>
        <div class="stat-value">${githubSync}</div>
        <div class="stat-label">GitHub Sync</div>
      </div>
      <div class="stat-card">
        <div class="stat-header">
          <div class="stat-icon" style="background:#f59e0b15; color:#f59e0b">✅</div>
          <span class="stat-trend" style="background:#f59e0b15; color:#f59e0b">+18%</span>
        </div>
        <div class="stat-value">${completedTasks.length}</div>
        <div class="stat-label">Completed</div>
      </div>
    </div>
  `;

  // Projects
  const COLORS = ['#06b6d4', '#8b5cf6', '#10b981', '#f59e0b', '#ec4899', '#3b82f6'];
  const pColors = { High: '#ef4444', Med: '#f59e0b', Low: '#10b981' };
  
  let projectsHtml = '';
  if (projects.length === 0) {
    projectsHtml = `<div class="empty">No active projects.</div>`;
  } else {
    projectsHtml = projects.map((p, i) => {
      const pTasks = tasks.filter(t => t.projectId === p.id);
      const pCompleted = pTasks.filter(t => ['completed', 'deployed'].includes(t.status)).length;
      const progress = pTasks.length ? (pCompleted / pTasks.length) * 100 : 0;
      const color = p.color || COLORS[i % COLORS.length];
      const priorities = ['High', 'Med', 'Low'];
      const priority = priorities[p.name.length % 3];
      
      return `
        <div class="project-card" onclick="openProject('${esc(p.id)}')">
          <div style="position:absolute; top:0; left:0; width:100%; height:3px; background:linear-gradient(90deg, ${color}, transparent)"></div>
          <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;">
            <div class="proj-title">${esc(p.name)}</div>
            <div class="proj-priority" style="background:${pColors[priority]}15; color:${pColors[priority]}">${priority}</div>
          </div>
          <div class="proj-desc">${esc(p.description || 'No description available for this project.')}</div>
          <div class="proj-meta">
            <div style="font-size:12px; color:var(--text-2); display:flex; gap:12px">
              <span>📋 ${pTasks.length} tasks</span>
              <span>🐛 ${pTasks.length % 3} bugs</span>
            </div>
            <div style="width:22px; height:22px; border-radius:50%; background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; font-size:10px; border:2px solid var(--bg-card)">${initials}</div>
          </div>
          <div class="progress-bg">
            <div class="progress-fill" style="width:${progress}%; background:linear-gradient(90deg, ${color}, ${color}80)"></div>
          </div>
        </div>
      `;
    }).join('');
  }

  // Deadlines
  const deadlines = pendingTasks.filter(t => t.dueDate).slice(0, 5);
  let deadlinesHtml = '';
  if (deadlines.length === 0) deadlinesHtml = `<div class="empty">No upcoming deadlines</div>`;
  else {
    deadlinesHtml = deadlines.map((t, i) => `
      <div class="deadline-item" onclick="openProject('${esc(t.projectId)}')">
        <div style="width:8px; height:8px; border-radius:50%; background:${i===0?'var(--danger)':'var(--warning)'}; margin-top:4px;"></div>
        <div style="font-size:13px; font-weight:600; color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(t.title)}</div>
      </div>
    `).join('');
  }

  // Weekly Prod (Fake bars as requested)
  const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
  const chartHtml = days.map((day, idx) => {
    const h = 30 + Math.random() * 70;
    return `
      <div class="chart-col">
        <div class="chart-bar" style="height:${h}%; background:${idx === 4 ? 'var(--accent)' : 'rgba(255,255,255,0.1)'}"></div>
        <span style="font-size:11px; color:${idx === 4 ? 'var(--text-1)' : 'var(--text-3)'}; font-weight:600">${day}</span>
      </div>
    `;
  }).join('');

  // Recent Activity
  const recent = [...tasks].sort((a,b) => new Date(b.updatedAt||0) - new Date(a.updatedAt||0)).slice(0, 4);
  let recentHtml = '';
  if (recent.length === 0) recentHtml = `<div class="empty">No recent activity</div>`;
  else {
    recentHtml = recent.map((t, i) => `
      <div class="recent-item">
        <div style="position:relative;">
          <div class="recent-icon">${i % 2 === 0 ? '🚀' : '✨'}</div>
          ${i !== 3 ? '<div class="line"></div>' : ''}
        </div>
        <div>
          <div style="font-size:13px; color:var(--text-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
            <span style="color:var(--text-1); font-weight:600">${name}</span> ${i % 2 === 0 ? 'deployed' : 'updated'} 
            <span style="color:var(--accent); font-weight:500" onclick="openProject('${esc(t.projectId)}')">${esc(t.title.slice(0, 20))}...</span>
          </div>
          <div style="font-size:11px; color:var(--text-3); margin-top:2px;">${timeAgo(t.updatedAt)}</div>
        </div>
      </div>
    `).join('');
  }

  root.innerHTML = `
    <div class="banner">
      <div class="banner-left">
        <div class="avatar">${avatarHtml}</div>
        <div>
          <div class="greeting">Good ${greeting}, ${name}</div>
          <div class="subtitle">You have ${pendingTasks.length} active tasks across ${activeProjects} projects.</div>
        </div>
      </div>
      <button class="btn-primary" onclick="openCreateProject()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Project
      </button>
    </div>

    <div class="grid-row-1">
      ${statsHtml}
      <div class="card" style="padding:20px;">
        <div class="card-title">
          <span>Activity Map</span>
        </div>
        <div class="activity-map-box">
          <div class="map-month">${new Date().toLocaleString('default', { month: 'long' })}</div>
          <img src="https://ghchart.rshah.org/06b6d4/jofra-shiva" style="height:88px; max-width:none; margin-top:-12px; margin-right:-4px; filter:invert(1) hue-rotate(180deg) brightness(1.2) contrast(1.1) saturate(1.3)" onerror="this.style.display='none'"/>
        </div>
      </div>
    </div>

    <div class="grid-row-2">
      <div class="card" style="height:280px; padding:24px;">
        <div class="card-title" style="justify-content:space-between;">
          Active Projects
          <a href="#" onclick="vscode.postMessage({command:'openProjectsList'})" style="font-size:12px; color:var(--accent); text-decoration:none;">View all →</a>
        </div>
        <div class="projects-grid custom-scrollbar" style="overflow-y:auto; padding-right:4px;">
          ${projectsHtml}
        </div>
      </div>
      
      <div class="card" style="height:280px; padding:24px;">
        <div class="card-title" style="justify-content:space-between;">
          <div style="display:flex; align-items:center; gap:8px;">
            Upcoming Deadlines
            <span style="font-size:10px; background:var(--danger); color:#fff; padding:2px 6px; border-radius:4px;">Due</span>
          </div>
        </div>
        <div class="task-list">
          ${deadlinesHtml}
        </div>
      </div>
    </div>

    <div class="grid-row-3">
      <div class="card" style="justify-content:center;">
        <div class="card-title" style="margin-bottom:20px;">Weekly Productivity</div>
        <div class="chart-container">
          ${chartHtml}
        </div>
      </div>
      
      <div class="card">
        <div class="card-title" style="margin-bottom:16px;">Recent Activity</div>
        <div class="task-list" style="overflow:hidden">
          ${recentHtml}
        </div>
      </div>
    </div>
  `;
}

function openProject(id) {
  vscode.postMessage({ command: 'openProject', projectId: id });
}

function openCreateProject() {
  document.getElementById('create-project-modal').classList.remove('hidden');
}

function closeCreateProject() {
  document.getElementById('create-project-modal').classList.add('hidden');
}

function submitCreateProject() {
  const name = document.getElementById('cp-name').value.trim();
  const desc = document.getElementById('cp-desc').value.trim();
  const url = document.getElementById('cp-url').value.trim();
  if (!name) return alert('Project name is required');
  vscode.postMessage({ command: 'createProject', name, description: desc, liveUrl: url });
  
  const btn = document.getElementById('btn-submit-project');
  btn.disabled = true;
  btn.textContent = 'Creating...';
}

vscode.postMessage({ command: 'ready' });
</script>
</body>
</html>
